name: safe_station
version: 0.1.0
type: environment
entry_point: "server.app:app"
description: Safe Station environment for OpenEnv Meta Hackathon 2026

tasks:
  - id: easy_start
    name: "Task 1: Easy Start"
    description: "Successfully charge 1-2 cars with limited grid fluctuations."
    difficulty: "easy"
    grader: "server.graders:grade_easy"

  - id: medium_ops
    name: "Task 2: Medium Operations"
    description: "Manage multiple car arrivals and peak-pricing hours."
    difficulty: "medium"
    grader: "server.graders:grade_medium"

  - id: hard_constraints
    name: "Task 3: Hard Constraints"
    description: "High traffic station with frequent cars and expensive peak electricity."
    difficulty: "hard"
    grader: "server.graders:grade_hard"
